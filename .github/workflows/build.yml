name: Build Firmware

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
  # Refresh the GitHub Pages demo when a release is published, so the web
  # flasher's "stable" firmware follows the actually-published release (#108).
  release:
    types: [ published ]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
    strategy:
      matrix:
        board: [waveshare_photopainter_73, seeedstudio_xiao_ee02, seeedstudio_reterminal_e1002, seeedstudio_xiao_ee04, seeedstudio_reterminal_e1004, seeedstudio_reterminal_e1003]
        include:
          - board: waveshare_photopainter_73
            flash_size: 16MB
          - board: seeedstudio_xiao_ee02
            flash_size: 16MB
          - board: seeedstudio_reterminal_e1002
            flash_size: 32MB
          - board: seeedstudio_xiao_ee04
            flash_size: 16MB
          - board: seeedstudio_reterminal_e1004
            flash_size: 32MB
          - board: seeedstudio_reterminal_e1003
            flash_size: 32MB
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Extract version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/}"
        else
          VERSION=$(python3 scripts/get_version.py --type dev)
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${VERSION}"

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'

    - name: Build webapp
      run: python3 build.py --step webapp

    - name: Install splash screen system dependencies
      run: |
        pip install qrcode
        sudo apt-get update && sudo apt-get install -y librsvg2-bin

    - name: Generate splash screen
      run: python3 build.py --board ${{ matrix.board }} --step splash

    - name: Setup ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: release-v6.0
        target: esp32s3
        command: |
          python3 build.py --board ${{ matrix.board }} --step firmware \
            -DFIRMWARE_VERSION='${{ steps.version.outputs.version }}'

    - name: Install esptool
      run: pip install esptool

    - name: Prepare & merge firmware artifacts
      run: |
        mkdir -p firmware

        # Create merged firmware directly from build directory
        esptool.py --chip esp32s3 merge-bin -o firmware/photoframe-firmware-${{ matrix.board }}-merged.bin \
          --flash_mode dio --flash_freq 80m --flash_size ${{ matrix.flash_size }} \
          0x0 build/bootloader/bootloader.bin \
          0x8000 build/partition_table/partition-table.bin \
          0x20000 build/esp32-photoframe.bin

        # Copy OTA binary with board name for release
        cp build/esp32-photoframe.bin firmware/esp32-photoframe-${{ matrix.board }}.bin

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: photoframe-firmware-${{ matrix.board }}
        path: firmware/
        retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: [ci, build]
    # Tag pushes only — a release-published event also carries a tag ref, but
    # re-running this job then would draft over the just-published release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - name: Download all firmware artifacts
      uses: actions/download-artifact@v4
      with:
        path: firmware-artifacts
        pattern: photoframe-firmware-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        files: |
          firmware-artifacts/photoframe-firmware-waveshare_photopainter_73-merged.bin
          firmware-artifacts/esp32-photoframe-waveshare_photopainter_73.bin
          firmware-artifacts/photoframe-firmware-seeedstudio_xiao_ee02-merged.bin
          firmware-artifacts/esp32-photoframe-seeedstudio_xiao_ee02.bin
          firmware-artifacts/photoframe-firmware-seeedstudio_reterminal_e1002-merged.bin
          firmware-artifacts/esp32-photoframe-seeedstudio_reterminal_e1002.bin
          firmware-artifacts/photoframe-firmware-seeedstudio_xiao_ee04-merged.bin
          firmware-artifacts/esp32-photoframe-seeedstudio_xiao_ee04.bin
          firmware-artifacts/photoframe-firmware-seeedstudio_reterminal_e1004-merged.bin
          firmware-artifacts/esp32-photoframe-seeedstudio_reterminal_e1004.bin
          firmware-artifacts/photoframe-firmware-seeedstudio_reterminal_e1003-merged.bin
          firmware-artifacts/esp32-photoframe-seeedstudio_reterminal_e1003.bin
        body: |
          ## What's New

          ## Improvements

          ## Installation
          ### Web Flasher (Easiest)

          Flash directly from your browser (Chrome/Edge/Opera required):
          **[https://aitjcize.github.io/esp32-photoframe/#flash](https://aitjcize.github.io/esp32-photoframe/)**

          ### Manually
          Choose the appropriate merged binary for your board:
          - `photoframe-firmware-waveshare_photopainter_73-merged.bin`: For Waveshare 7.3" 7-color e-paper
          - `photoframe-firmware-seeedstudio_xiao_ee02-merged.bin`: For Seeed XIAO EE02
          - `photoframe-firmware-seeedstudio_reterminal_e1002-merged.bin`: For Seeed reTerminal E1002
          - `photoframe-firmware-seeedstudio_xiao_ee04-merged.bin`: For Seeed XIAO EE04
          - `photoframe-firmware-seeedstudio_reterminal_e1004-merged.bin`: For Seeed reTerminal E1004
          - `photoframe-firmware-seeedstudio_reterminal_e1003-merged.bin`: For Seeed reTerminal E1003 (10.3" grayscale)

          ```bash
          esptool.py --chip esp32s3 --port /dev/ttyUSB0 --baud 921600 write_flash 0x0 photoframe-firmware-[board]-merged.bin
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [ci, build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    concurrency:
      group: deploy-pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Download all firmware artifacts
      uses: actions/download-artifact@v4
      with:
        path: firmware-artifacts
        pattern: photoframe-firmware-*
        merge-multiple: true

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'

    - name: Build demo webapp
      run: |
        cd webapp
        npm ci
        npm run build:demo

    - name: Copy firmware and generate manifests
      run: |
        # Create demo directory if it doesn't exist
        mkdir -p demo

        # Copy static assets for the demo landing page
        cp .img/sample.jpg demo/
        cp .img/taipei101.jpg demo/
        cp .img/stock_algorithm.bmp demo/
        cp .img/our_algorithm.png demo/
        cp .img/feature_graphic.png demo/
        cp webapp/public/icon.svg demo/

        # Generate the dithered hero preview from taipei101.jpg
        node webapp/node_modules/@aitjcize/epaper-image-convert/src/cli.js \
          -d 800x480 -f png -p balanced \
          --orientation landscape --scale-mode cover \
          --use-perceived-output --dither-algorithm stucki \
          .img/taipei101.jpg demo/taipei101_dithered.png

        # Determine stable version
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # On a tag push: use this tag as stable version
          STABLE_TAG="${GITHUB_REF#refs/tags/}"
        else
          # On main branch: check if HEAD has a tag (e.g., tag and main pushed together)
          HEAD_TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [[ -n "$HEAD_TAG" ]]; then
            STABLE_TAG="$HEAD_TAG"
          else
            # Fall back to latest published release
            STABLE_TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "")
          fi
        fi
        echo "Stable version: ${STABLE_TAG:-none}"

        BOARDS="waveshare_photopainter_73 seeedstudio_xiao_ee02 seeedstudio_reterminal_e1002 seeedstudio_xiao_ee04 seeedstudio_reterminal_e1004 seeedstudio_reterminal_e1003"

        for board in $BOARDS; do
          mkdir -p "demo/$board"

          # Dev firmware from this build
          cp "firmware-artifacts/photoframe-firmware-$board-merged.bin" "demo/$board/photoframe-firmware-$board-dev.bin"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # For releases: use this build as stable
            cp "demo/$board/photoframe-firmware-$board-dev.bin" "demo/$board/photoframe-firmware-$board-merged.bin"
          elif [[ -n "$STABLE_TAG" ]]; then
            # For main branch: download from latest published release using gh (authenticated)
            echo "Downloading stable release ${STABLE_TAG} firmware for $board..."
            if gh release download "$STABLE_TAG" --pattern "photoframe-firmware-$board-merged.bin" --dir "demo/$board" --clobber; then
              echo "Successfully downloaded stable firmware ${STABLE_TAG} for $board"
            elif [[ "$board" == "waveshare_photopainter_73" ]] && gh release download "$STABLE_TAG" --pattern "photoframe-firmware-merged.bin" --dir "demo/$board" --clobber; then
              echo "Successfully downloaded legacy stable firmware for $board"
              mv "demo/$board/photoframe-firmware-merged.bin" "demo/$board/photoframe-firmware-$board-merged.bin"
            else
              echo "::warning::No stable release asset for $board at ${STABLE_TAG} (release build may still be uploading). Omitting the stable option — NOT falling back to the dev build."
              rm -f "demo/$board/photoframe-firmware-$board-merged.bin"
            fi
          else
            echo "::warning::No published release found; omitting the stable option for $board — NOT falling back to the dev build."
            rm -f "demo/$board/photoframe-firmware-$board-merged.bin"
          fi

          # Generate manifests for this board (pass stable version to match the firmware)
          python3 scripts/generate_manifests.py --no-copy --dev --demo-dir "demo/$board" --board "$board" \
            ${STABLE_TAG:+--stable-version "$STABLE_TAG"}
        done

        # Link a default manifest at the root of demo for backward compatibility or default view
        # (the stable manifest may be absent if no release asset was available)
        [ -f demo/waveshare_photopainter_73/manifest.json ] && cp demo/waveshare_photopainter_73/manifest.json demo/
        cp demo/waveshare_photopainter_73/manifest-dev.json demo/
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages artifact
      id: upload
      uses: actions/upload-pages-artifact@v3
      with:
        path: demo

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
